 # Secret Scanning 自訂設定
   # 路徑: .github/secret-scanning.yml
   #
   # ⚠️ Secret Scanning 的啟用方式：
   #   Settings → Code security and analysis → Secret scanning → Enable
   #   Settings → Code security and analysis → Push protection → Enable
   #
   # 此檔案用於定義要排除掃描的路徑（例如測試用的假資料）
   
   paths-ignore:
     - "tests/fixtures/**"
     - "docs/**"
     # 注意：不要排除 config.py，我們需要 Secret Scanning 偵測到歷史中的金鑰！