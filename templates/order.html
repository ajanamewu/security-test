{% extends "base.html" %}
{% block title %}SpeedyPizza — 訂購披薩{% endblock %}

{% block content %}
<section class="order-form">
    <h1>🛒 訂購披薩</h1>
    <p>選擇您喜愛的披薩，填寫資料後即可下單！</p>

    <form method="POST" action="{{ url_for('order') }}">
        <div class="form-group">
            <label for="customer_name">您的姓名</label>
            <input type="text" id="customer_name" name="customer_name" placeholder="請輸入姓名" required>
        </div>

        <div class="form-group">
            <label for="pizza_id">選擇披薩</label>
            <select id="pizza_id" name="pizza_id" required>
                <option value="">— 請選擇 —</option>
                {% for pizza in pizzas %}
                <option value="{{ pizza.id }}">{{ pizza.name }} — NT$ {{ "%.0f"|format(pizza.price) }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="quantity">數量</label>
            <input type="number" id="quantity" name="quantity" value="1" min="1" max="10" required>
        </div>

        <button type="submit" class="btn btn-primary">確認訂購</button>
    </form>
</section>
{% endblock %}
